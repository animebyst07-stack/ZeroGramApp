name: Build APK

on: 
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файлы
        uses: actions/checkout@v4

      - name: Распаковываем TAR.GZ архив
        run: tar -xzf ZeroGram.tar.gz

      - name: Устанавливаем Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Устанавливаем официальный Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Собираем APK
        run: |
          DIR=$(dirname $(find . -name "settings.gradle" | head -1))
          cd "$DIR"
          gradle assembleDebug

      - name: Сохраняем готовый APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroGram-apk
          path: '**/*.apk'
