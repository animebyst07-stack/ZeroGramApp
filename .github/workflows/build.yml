name: Build APK

on: 
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем файлы из репозитория
        uses: actions/checkout@v4

      - name: Распаковываем ZIP
        run: unzip ZeroGram.zip

      - name: Устанавливаем Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Даем права и собираем APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Сохраняем готовый APK
        uses: actions/upload-artifact@v4
        with:
          name: ZeroGram-apk
          path: app/build/outputs/apk/debug/*.apk
